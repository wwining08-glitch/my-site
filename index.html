  <script type="module">

    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
    const GEOCODE_API_KEY = "AIzaSyCcOsAjBaeM6BlVmq9seGdB-FJF9ui97ps";
    const state={user:null,tab:"home",view:"home",today:null,monthLogs:[],monthCursor:new Date()},$app=document.getElementById("app"),$tabs=document.getElementById("tabs");
    const adminUid="0wygsKaSTMe9Pr7mkbHuguRfnXt1",isAdmin=()=>state.user?.uid===adminUid,dayKey=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`,uid=()=>state.user.uid;
    const logRef=()=>doc(db,"attendance",`${uid()}_${dayKey()}`),t=(ms)=>ms?new Date(ms).toLocaleTimeString("ko-KR",{hour12:false}):"-",mins=(a,b)=>!a||!b?0:Math.max(0,Math.floor((b-a)/60000)),hm=(m)=>`${Math.floor(m/60)}시간 ${m%60}분`;
    async function geo(){return new Promise((r)=>navigator.geolocation?.getCurrentPosition(p=>r({lat:p.coords.latitude,lng:p.coords.longitude}),()=>r(null),{enableHighAccuracy:true,timeout:8000}))}
    async function toAddress(lat,lng){
      if(typeof lat!=="number"||typeof lng!=="number") return { addr:"", reason:"좌표없음" };
      try{
        const url=`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&language=ko&key=${GEOCODE_API_KEY}`;
        const res=await fetch(url);
        const data=await res.json();
        if(!res.ok) return { addr:"", reason:`HTTP_${res.status}` };
        const status = data?.status || "";
        if(status !== "OK") return { addr:"", reason: status || "GEOCODE_STATUS_EMPTY" };
        const addr = data?.results?.[0]?.formatted_address || "";
        if(!addr) return { addr:"", reason:"주소결과없음" };
        return { addr, reason:"" };
      }catch{
        return { addr:"", reason:"API실패" };
      }
    }
    async function loadToday(){try{const s=await getDoc(logRef());state.today=s.exists()?s.data():null}catch{state.today=null}}
    async function loadMonth(){
      try{
        const c = state.monthCursor || new Date();
        const p = `${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,"0")}`;
        const qs=await getDocs(query(collection(db,"attendance"),where("uid","==",uid())));

      }catch{state.monthLogs=[]}
    }
    async function checkIn(){
      if(state.today?.inAt)return;
      const g=await geo();

        await setDoc(logRef(),{uid:uid(),email:state.user.email,date:dayKey(),inAt:Date.now(),inAddr:"",inAddrReason:"위치권한거부"},{merge:true});

        uid:uid(),email:state.user.email,date:dayKey(),inAt:Date.now(),
        inLat:g?.lat??null,inLng:g?.lng??null,inAddr:geoRes.addr,inAddrReason:geoRes.reason
      },{merge:true});
      await loadToday();render()
    }
    async function checkOut(){
      const g=await geo();

      }

      }

        outAt:Date.now(),outLat:g?.lat??null,outLng:g?.lng??null,
        outAddr:geoRes.addr,outAddrReason:geoRes.reason

    function loginView(){$tabs.style.display="none";$app.innerHTML=`<div style="padding-top:120px"><div style="text-align:center"><div class="title">(주)winning</div><div class="sub">GPS 기반 출근부 관리</div></div><div style="margin-top:40px" class="sub">이메일</div><input id="em" class="input" placeholder="이메일을 입력하세요"><div class="sub" style="margin-top:8px">비밀번호</div><input id="pw" class="input" type="password" placeholder="비밀번호를 입력하세요"><button id="loginBtn" class="btn btn-main" style="width:100%;margin-top:12px">로그인</button></div>`;document.getElementById("loginBtn").onclick=async()=>{try{await signInWithEmailAndPassword(auth,document.getElementById("em").value.trim(),document.getElementById("pw").value)}catch(e){alert(e.message)}}}

번 달 통계</div><div class="card gray"><div class="row"><div class="col"><div class="sub">근무일</div></div><div class="col" style="text-align:right;font-size:30px;font-weight:800">${state.monthLogs.length}일</div></div><div class="row"><div class="col"><div class="sub">총 근무시간</div></div><div class="col" style="text-align:right;font-size:30px;font-weight:800">${hm(monthMin)}</div></div></div><div class="sub" style="font-size:18px;font-weight:800;margin:12px 0 8px;color:#111827">최근 기록</div>${list.map(x=>`<div class="card gray"><div class="sub">${x.date}</div><div style="font-size:20px">${t(x.inAt)} ~ ${t(x.outAt)}</div><div style="text-align:right;color:#0f83a6;font-weight:800">${dur(x)}</div></div>`).join("")}`;document.getElementById("back1").onclick=()=>{state.view="home";render()}}

    async function requestTab(){

        try{
          await addDoc(collection(db,"requests"),{

        try{
          const qs = await getDocs(collection(db,"vacations"));
          list = qs.docs.map((x)=>({id:x.id,...x.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        }catch{}
        const useOf = (type)=> type==="연차" ? 1 : type==="반차" ? 0.5 : 0;
        const summary = {};
        list.filter(v=>v.status==="approved").forEach((v)=>{
          if(!summary[v.email]) summary[v.email] = {used:0};
          summary[v.email].used += useOf(v.type);
        });
        const rows = Object.entries(summary).map(([email,val])=>{
          const remain = Math.max(0, 15 - (val.used||0));
          return `<div class="card gray"><div style="font-weight:700">${email}</div><div class="sub">사용: ${val.used}일 / 잔여: ${remain}일</div></div>`;
        }).join("") || `<div class="card gray"><div class="sub">승인된 휴가가 없습니다.</div></div>`;

        $app.innerHTML = `<div class="card">
          <div style="font-size:24px;font-weight:800">휴가 관리(관리자)</div>
          <div class="sub" style="margin-top:6px">직원별 연차 현황 (기본 15일)</div>
          ${rows}
          <div style="font-size:20px;font-weight:800;margin-top:10px">휴가 요청 목록</div>
          ${list.length===0?`<div class="card gray"><div class="sub">휴가 요청이 없습니다.</div></div>`:list.map((v)=>`<div class="card gray"><div class="menu"><div style="font-weight:700">${v.email||"-"}</div><div style="font-size:12px;padding:4px 8px;border-radius:999px;background:${v.status==="approved"?"#dcfce7":v.status==="rejected"?"#fee2e2":"#dbeafe"};color:${v.status==="approved"?"#166534":v.status==="rejected"?"#991b1b":"#1d4ed8"}">${v.status==="approved"?"승인":v.status==="rejected"?"반려":"대기"}</div></div><div class="sub">${v.startDate} ~ ${v.endDate} / ${v.type}</div><div class="sub">사유: ${v.reason||"-"}</div>${v.status==="pending"?`<div class="row" style="margin-top:8px"><button class="btn btn-main col" data-v-ok="${v.id}">승인</button><button class="btn col" style="background:#fee2e2;color:#991b1b" data-v-no="${v.id}">반려</button></div>`:""}</div>`).join("")}
        </div>`;
        document.querySelectorAll("[data-v-ok]").forEach((b)=>b.onclick=async()=>{await setDoc(doc(db,"vacations",b.dataset.vOk),{status:"approved"},{merge:true}); vacationTab();});
        document.querySelectorAll("[data-v-no]").forEach((b)=>b.onclick=async()=>{await setDoc(doc(db,"vacations",b.dataset.vNo),{status:"rejected"},{merge:true}); vacationTab();});
        return;
      }
      const today = new Date().toISOString().slice(0,10);
      $app.innerHTML = `<div class="card">
        <div class="menu"><div style="font-size:24px;font-weight:800">휴가 신청</div></div>
        <div class="sub" style="margin-top:8px">휴가 유형</div>
        <select id="vacType" class="input">
          <option value="연차">연차</option>
          <option value="반차">반차</option>
          <option value="병가">병가</option>
          <option value="기타">기타</option>
        </select>
        <div class="row">
          <div class="col"><div class="sub">시작일</div><input id="vacStart" class="input" type="date" value="${today}" /></div>
          <div class="col"><div class="sub">종료일</div><input id="vacEnd" class="input" type="date" value="${today}" /></div>
        </div>
        <div class="sub">사유</div>
        <textarea id="vacReason" class="input" style="height:90px;resize:none" placeholder="휴가 사유를 입력해 주세요"></textarea>
        <div class="row"><button id="vacSubmit" class="btn btn-main col">제출</button><button id="vacHistoryBtn" class="btn col" style="background:#e5e7eb;color:#111827">휴가 내역 보기</button></div>
      </div>`;
      document.getElementById("vacSubmit").onclick = async ()=>{
        const type = document.getElementById("vacType").value;
        const startDate = document.getElementById("vacStart").value;
        const endDate = document.getElementById("vacEnd").value;
        const reason = document.getElementById("vacReason").value.trim();
        if(!startDate || !endDate) return alert("기간을 선택해 주세요.");
        if(startDate > endDate) return alert("종료일이 시작일보다 빠를 수 없습니다.");
        if(!reason) return alert("사유를 입력해 주세요.");
        try{
          await addDoc(collection(db,"vacations"),{
            uid: uid(),
            email: state.user.email,
            type,
            startDate,
            endDate,
            reason,
            status: "pending",
            createdAt: Date.now()
          });
          const spanDays = type==="반차" ? 0.5 : 1;
          await setDoc(doc(db,"attendance",`${uid()}_${startDate}`),{
            uid: uid(), email: state.user.email, date: startDate, leaveType: type, leaveDays: spanDays
          },{merge:true});
          alert("휴가 신청이 제출되었습니다.");
          vacationTab();
        }catch(e){
          alert(e.message || "휴가 신청 실패");
        }
      };
      document.getElementById("vacHistoryBtn").onclick = ()=>{ state.view = "vacation-history"; render(); };
    }
    async function vacationHistoryView(){
      let list = [];
      try{
        const qs = await getDocs(query(collection(db,"vacations"), where("uid","==",uid())));
        list = qs.docs.map((x)=>({id:x.id,...x.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      }catch{}
      $app.innerHTML = `<div class="card"><div class="menu"><div style="font-size:24px;font-weight:800">휴가 내역</div><button id="backVac" class="btn">‹</button></div>
      ${list.length===0?`<div class="card gray"><div class="sub">휴가 신청 내역이 없습니다.</div></div>`:list.map((v)=>`<div class="card gray"><div class="menu"><div style="font-weight:700">${v.startDate} ~ ${v.endDate}</div><div style="font-size:12px;padding:4px 8px;border-radius:999px;background:${v.status==="approved"?"#dcfce7":v.status==="rejected"?"#fee2e2":"#dbeafe"};color:${v.status==="approved"?"#166534":v.status==="rejected"?"#991b1b":"#1d4ed8"}">${v.status==="approved"?"승인":v.status==="rejected"?"반려":"대기"}</div></div><div class="sub">유형: ${v.type}</div><div class="sub">사유: ${v.reason||"-"}</div></div>`).join("")}
      </div>`;
      document.getElementById("backVac").onclick = ()=>{ state.view="home"; state.tab="vacation"; render(); };
    }
    async function profileTab(){
      const email = state.user?.email || "-";
      let name = email.split("@")[0] || "Unknown";
      let department = "본사(윈잉)";
      let role = "직원";
      let status = "활성";
      try{
        const s = await getDoc(doc(db,"staff",uid()));
        if(s.exists()){
          const d = s.data() || {};
          name = d.name || name;
          department = d.department || department;
          role = d.role || role;
          status = d.status || status;
        }
      }catch{}
      const initial = name.charAt(0).toUpperCase();
      $app.innerHTML = `
      <div class="card" style="padding:0;background:transparent">
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #d1d5db;padding:12px 4px">
          <div style="font-size:24px;font-weight:800">프로필</div>
          <button id="logoutTop" class="btn" style="background:transparent;color:#ef4444;padding:0">로그아웃</button>
        </div>
        <div style="text-align:center;padding:14px 0">
          <div style="width:62px;height:62px;border-radius:999px;background:#0f83a6;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:32px;font-weight:800">${initial}</div>
          <div style="font-size:38px;font-weight:800;margin-top:8px">${name}</div>
          <div class="sub" style="margin-top:3px">${email}</div>
        </div>
        <div class="card gray" style="padding:0">
          <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #d1d5db"><span class="sub">역할</span><span style="font-weight:800">${role}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #d1d5db"><span class="sub">사업장</span><span style="font-weight:800">${department}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 12px"><span class="sub">상태</span><span style="font-weight:800;color:#16a34a">${status}</span></div>
        </div>
        <div style="font-size:20px;font-weight:800;margin:12px 0 6px">앱 정보</div>
        <div class="card gray" style="padding:0">
          <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #d1d5db"><span class="sub">앱 버전</span><span>1.0.0</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 12px"><span class="sub">데이터 동기화</span><span style="font-weight:800;color:#16a34a">정상</span></div>
        </div>
      </div>`;
      document.getElementById("logoutTop").onclick = ()=>signOut(auth);
    }
    async function render(){document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.tab===state.tab));if(!state.user)return loginView();$tabs.style.display="grid";await loadToday();await loadMonth();if(state.tab==="home"){if(state.view==="solo")return soloView();if(state.view==="month")return monthView();return homeView()}if(state.tab==="request"){if(state.view==="request-history")return requestHistoryView();return requestTab();}if(state.tab==="schedule")return scheduleTab();if(state.tab==="attendance")return attendanceTab();if(state.tab==="vacation"){if(state.view==="vacation-history")return vacationHistoryView();return vacationTab();}if(state.tab==="profile")return await profileTab();}
    document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>{state.tab=x.dataset.tab;if(state.tab!=="home")state.view="home";render()});
    onAuthStateChanged(auth,async(u)=>{state.user=u;state.tab="home";state.view="home";await render()});
  </script>
</body>
</html>
