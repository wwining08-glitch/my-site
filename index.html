<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>윈잉 출근부</title>
  <style>
    body{margin:0;background:#f3f4f6;font-family:"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;color:#111827}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding:14px 12px 88px}
    .title{font-size:24px;font-weight:800}
    .sub{color:#6b7280}
    .panel{background:#0f83a6;color:#fff;border-radius:18px;padding:16px;margin:10px 0}
    .clock{font-size:48px;text-align:center;font-weight:800;margin:16px 0}
    .row{display:flex;gap:10px}.col{flex:1}
    .btn{border:0;border-radius:12px;padding:12px 10px;font-weight:800}
    .btn-main{background:#0f83a6;color:#fff}.btn-soft{background:#59a6c4;color:#fff}
    .card{background:#fff;border-radius:14px;padding:12px;margin:10px 0}
    .gray{background:#e9ebee}
    .input{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px;margin:6px 0}
    .tabs{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:#fff;border-top:1px solid #d1d5db;display:grid;grid-template-columns:repeat(4,1fr)}
    .tab{border:0;background:transparent;padding:10px;color:#6b7280;font-weight:700}.tab.active{color:#0f83a6}
    .menu{display:flex;justify-content:space-between;align-items:center}
    .mini{font-size:12px;color:#6b7280}
    .big{font-size:28px;font-weight:800}
    .center{text-align:center}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <div id="tabs" class="tabs" style="display:none">
    <button class="tab active" data-tab="home">홈</button>
    <button class="tab" data-tab="record">기록</button>
    <button class="tab" data-tab="profile">프로필</button>
    <button class="tab" data-tab="more">더보기</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCM8fV0FPTRAQABmUkspE4oo-Jdm7RQ7Vk",
      authDomain: "winning-c2091.firebaseapp.com",
      projectId: "winning-c2091",
      storageBucket: "winning-c2091.firebasestorage.app",
      messagingSenderId: "552557672048",
      appId: "1:552557672048:web:1cdb387d28e53012c066b5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const state = { user:null, tab:"home", view:"home", today:null, monthLogs:[] };
    const $app = document.getElementById("app");
    const $tabs = document.getElementById("tabs");
    const adminUid = "0wygsKaSTMe9Pr7mkbHuguRfnXt1";
    const isAdmin = ()=> state.user?.uid===adminUid;
    const dayKey = (d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const t = (ms)=> ms ? new Date(ms).toLocaleTimeString("ko-KR",{hour12:false}) : "-";
    const uid = ()=> state.user.uid;
    const logRef = ()=> doc(db,"attendance",`${uid()}_${dayKey()}`);
    const mins = (a,b)=> !a||!b?0:Math.max(0,Math.floor((b-a)/60000));
    const hm = (m)=>`${Math.floor(m/60)}시간 ${m%60}분`;

    async function geo(){
      return new Promise((r)=> navigator.geolocation?.getCurrentPosition(
        p=>r({lat:p.coords.latitude,lng:p.coords.longitude}), ()=>r(null), {enableHighAccuracy:true,timeout:8000}
      ));
    }
    async function loadToday(){ const s=await getDoc(logRef()); state.today=s.exists()?s.data():null; }
    async function loadMonth(){
      const p = dayKey().slice(0,7);
      const qs = await getDocs(query(collection(db,"attendance"), where("uid","==",uid())));
      state.monthLogs = qs.docs.map(x=>x.data()).filter(x=>String(x.date||"").startsWith(p)).sort((a,b)=>String(b.date).localeCompare(String(a.date)));
    }
    async function checkIn(){
      if(state.today?.inAt) return;
      const g = await geo();
      await setDoc(logRef(), {uid:uid(),email:state.user.email,date:dayKey(),inAt:Date.now(),inLat:g?.lat??null,inLng:g?.lng??null},{merge:true});
      await loadToday(); render();
    }
    async function checkOut(){
      const g = await geo();
      await setDoc(logRef(), {outAt:Date.now(),outLat:g?.lat??null,outLng:g?.lng??null},{merge:true});
      await loadToday(); render();
    }

    function loginView(){
      $tabs.style.display="none";
      $app.innerHTML = `<div style="padding-top:120px">
        <div class="center"><div class="title">(주)winning</div><div class="sub">GPS 기반 출근부 관리</div></div>
        <div style="margin-top:40px" class="mini">이메일</div><input id="em" class="input" placeholder="이메일을 입력하세요" />
        <div class="mini" style="margin-top:8px">비밀번호</div><input id="pw" class="input" type="password" placeholder="비밀번호를 입력하세요" />
        <button id="loginBtn" class="btn btn-main" style="width:100%;margin-top:12px">로그인</button>
      </div>`;
      document.getElementById("loginBtn").onclick = async ()=>{
        try{ await signInWithEmailAndPassword(auth, document.getElementById("em").value.trim(), document.getElementById("pw").value); }
        catch(e){ alert(e.message); }
      };
    }
    function homeView(){
      const d=state.today||{};
      $app.innerHTML = `<div class="menu"><div style="font-size:34px;font-weight:800">윈잉</div><div style="color:#0f83a6;font-weight:700">Today</div></div>
      <div class="panel"><div style="display:inline-block;background:rgba(255,255,255,.2);padding:6px 10px;border-radius:999px">${d.outAt?"퇴근":"출근"}</div><div class="clock">${t(Date.now())}</div><div class="row"><button id="inBtn" class="btn btn-soft col" ${d.inAt?"disabled":""}>출근</button><button id="outBtn" class="btn btn-soft col">퇴근</button></div></div>
      <div class="row"><div class="card gray col"><div class="sub">출근</div><div class="big" style="font-size:38px">${t(d.inAt)}</div></div><div class="card gray col"><div class="sub">퇴근</div><div class="big" style="font-size:38px">${t(d.outAt)}</div></div></div>
      <div class="card gray menu"><div><div style="font-weight:800;font-size:24px">혼자</div><div class="sub">월별 기록</div></div><button id="soloGo" class="btn">›</button></div>
      <div class="card gray menu"><div><div style="font-weight:800;font-size:24px">내 기록</div><div class="sub">근무기록 달력</div></div><button id="monthGo" class="btn">›</button></div>`;
      document.getElementById("inBtn").onclick=checkIn; document.getElementById("outBtn").onclick=checkOut;
      document.getElementById("soloGo").onclick=()=>{state.view="solo";render();};
      document.getElementById("monthGo").onclick=()=>{state.view="month";render();};
    }
    async function soloView(){
      await loadMonth();
      const d=state.today||{}; const m=mins(d.inAt,d.outAt); const list=state.monthLogs.slice(0,5);
      $app.innerHTML = `<div class="menu"><button id="back1" class="btn">‹</button><div style="font-size:32px;font-weight:800">혼자</div></div>
      <div style="font-size:24px;font-weight:800;margin:10px 0">월별 기록</div>
      <div class="panel"><div class="row"><div class="col"><div class="sub" style="color:#cfeaf3">출근</div><div style="font-size:42px;font-weight:800">${t(d.inAt)}</div></div><div class="col" style="text-align:right"><div class="sub" style="color:#cfeaf3">퇴근</div><div style="font-size:42px;font-weight:800">${t(d.outAt)}</div></div></div><hr style="border-color:rgba(255,255,255,.2)"><div class="sub" style="color:#cfeaf3">근무시간</div><div style="font-size:42px;font-weight:800">${hm(m)}</div></div>
      <div class="card gray"><div style="font-size:28px;font-weight:800">이번 달 통계</div><div class="row"><div class="col"><div class="sub">근무일</div><div style="font-size:36px;font-weight:800">${state.monthLogs.length}일</div></div><div class="col" style="text-align:right"><div class="sub">총 근무시간</div><div style="font-size:36px;font-weight:800">${hm(state.monthLogs.reduce((s,x)=>s+mins(x.inAt,x.outAt),0))}</div></div></div></div>
      <div style="font-size:28px;font-weight:800;margin:10px 0">최근 기록</div>
      ${list.map(x=>`<div class="card gray"><div class="sub">${x.date}</div><div style="font-size:30px">${t(x.inAt)} ~ ${t(x.outAt)}</div></div>`).join("")}`;
      document.getElementById("back1").onclick=()=>{state.view="home";render();};
    }
    async function monthView(){
      await loadMonth();
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth();
      const first = new Date(y, m, 1).getDay();
      const last = new Date(y, m + 1, 0).getDate();
      const map = Object.fromEntries(state.monthLogs.map((x) => [x.date, x]));
      const cells = [];
      for (let i = 0; i < first; i++) cells.push(`<div></div>`);
      for (let d = 1; d <= last; d++) {
        const date = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        const log = map[date];
        const wd = new Date(y, m, d).getDay();
        const c = wd === 0 ? "#ef4444" : wd === 6 ? "#0284c7" : "#111827";
        cells.push(`<div class="card gray" style="min-height:72px;padding:8px"><div style="font-weight:800;color:${c}">${d}</div>${log ? `<div style="font-size:11px">${t(log.inAt)}<br>${t(log.outAt)}</div>` : ""}</div>`);
      }
      $app.innerHTML = `<div style="font-size:28px;font-weight:800;margin-bottom:8px">근무기록</div>
      <div class="card gray menu"><button class="btn" id="backHomeMonth">‹</button><div style="font-size:28px;font-weight:800">${dayKey().slice(0,7).replace("-","년 ")}월</div><button class="btn">›</button></div>
      <div class="card gray"><div class="sub">총 근무시간 ${hm(state.monthLogs.reduce((s,x)=>s+mins(x.inAt,x.outAt),0))}</div></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:12px;margin-bottom:6px"><div style="color:#ef4444">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div style="color:#0284c7">토</div></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${cells.join("")}</div>`;
      document.getElementById("backHomeMonth").onclick = ()=>{ state.view = "home"; render(); };
    }
    function recordTab(){ monthView(); }
    async function profileTab(){ $app.innerHTML=`<div class="card"><div style="font-size:30px;font-weight:800">프로필</div><div style="margin:8px 0">${state.user.email}</div><button id="logout" class="btn btn-main">로그아웃</button></div>`; document.getElementById("logout").onclick=()=>signOut(auth); }
    function moreTab(){
      if(!isAdmin()){ $app.innerHTML=`<div style="min-height:70vh;display:flex;align-items:center;justify-content:center"><div class="center"><div style="font-size:66px">🔐</div><div style="font-size:40px;font-weight:800">접근 권한 없음</div><div class="sub">관리자만 접근할 수 있습니다.</div><button class="btn btn-main" id="goHome" style="margin-top:10px">홈으로 돌아가기</button></div></div>`; document.getElementById("goHome").onclick=()=>{state.tab="home";state.view="home";render();}; return; }
      $app.innerHTML=`<div class="card"><div style="font-size:32px;font-weight:800">관리자 대시보드</div></div>`;
    }

    async function render(){
      document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x.dataset.tab===state.tab));
      if(!state.user) return loginView();
      $tabs.style.display="grid";
      await loadToday();
      if(state.tab==="home"){ if(state.view==="solo") return soloView(); if(state.view==="month") return monthView(); return homeView(); }
      if(state.tab==="record") return recordTab();
      if(state.tab==="profile") return profileTab();
      if(state.tab==="more") return moreTab();
    }
    document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>{state.tab=x.dataset.tab; if(state.tab!=="home") state.view="home"; render();});
    onAuthStateChanged(auth, async (u)=>{state.user=u; state.tab="home"; state.view="home"; await render();});
    setInterval(()=>{ const c=document.querySelector(".clock"); if(c) c.textContent=t(Date.now()); },1000);
  </script>
</body>
</html>
